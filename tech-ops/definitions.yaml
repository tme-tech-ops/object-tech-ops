tosca_definitions_version: dell_1_1

imports:
  - dell/types/types.yaml
  - plugin:edge-plugin
  - plugin:utilities-plugin?version=>=3.1.3.0
  - plugin:fabric-plugin?version=>=3.3.2.0

dsl_definitions:

# Environment Checks
  env_precheck_inputs: &env_precheck_inputs
    script_path: tech-ops/scripts/env_precheck.sh
    process:
      env:
        OFFLINE_MODE: { get_input: offline_mode }
        OFFLINE_BINARY_URL: { get_input: offline_binary_url }
        OFFLINE_BINARY_USER: { get_input: offline_binary_access_user }
        OFFLINE_BINARY_PASSWORD: { get_secret: { get_input: offline_binary_access_token } }
        SCRIPT_URL: { get_input: script_url }
        RUN_ARG: { concat: ['"', { get_input: run_arg }, '"'] }
        REG_URL: { get_input: registry_url }
        REG_USER: { get_input: registry_access_user }
        REG_PASS: { get_input: registry_password }
    fabric_env:
      host_string: { get_environment_capability: vm_name_id }
      user: { get_environment_capability: vm_user_name }
      key: { get_secret: { get_environment_capability: vm_ssh_private_key } }
      port: 22
    hide_output: { get_input: hide_log_output }
    proxy_settings:
      auto_resolve: false
      target_id: { get_environment_capability: proxy_target_id }
      target_ip: { get_environment_capability: vm_name_id }

  env_postcheck_inputs: &env_postcheck_inputs
    script_path: tech-ops/scripts/env_postcheck.sh
    process:
      env:
        SWFS_USER: { get_input: swfs_user }
        SWFS_PASSWORD: { get_input: swfs_password }
        UPLOAD_OFFLINE_PACKAGE: { get_input: upload_package }
        UPLOAD_BASE_URL: { get_input: upload_binary_url }
        UPLOAD_OFFLINE_PACKAGE_USER: { get_input: upload_binary_access_user }
        UPLOAD_OFFLINE_PACKAGE_PASSWORD: { get_secret: { get_input: upload_binary_access_token } }
    fabric_env:
      host_string: { get_environment_capability: vm_name_id }
      user: { get_environment_capability: vm_user_name }
      key: { get_secret: { get_environment_capability: vm_ssh_private_key } }
      port: 22
    hide_output: { get_input: hide_log_output }
    proxy_settings:
      auto_resolve: false
      target_id: { get_environment_capability: proxy_target_id }
      target_ip: { get_environment_capability: vm_name_id }

# App deploy
  run_install_cmds: &run_install_cmds
    - concat: [ "sudo -E ./install-seaweedfs ", { get_attribute: [ env_precheck, capabilities, install_cmd ] } ]
  run_uninstall_cmds: &run_uninstall_cmds
    - "sudo -E ./install-seaweedfs uninstall"
  shell_env: &shell_env
    SWFS_USER: { get_input: swfs_user }
    SWFS_PASSWORD: { get_input: swfs_password }
    HOST_FQDN: { get_input: host_fqdn }
    ENABLE_MONITORING: { get_input: enable_monitoring }
    ENABLE_SMB: { get_input: enable_smb }
    ENABLE_NFS: { get_input: enable_nfs }
    ENABLE_MQ: { get_input: enable_mq }
    S3_BUCKET: { concat: ['"', { get_input: s3_bucket }, '"'] }
    CLUSTER_NAME: { get_input: cluster_name }
    DEBUG: { get_input: debug }
    SWFS_IMAGE: { get_input: swfs_image }
    CADDY_IMAGE: { get_input: caddy_image }
    SWFS_ADMIN_FQDN: { get_input: swfs_admin_fqdn }
    SWFS_MASTER_FQDN: { get_input: swfs_master_fqdn }
    SWFS_FILER_FQDN: { get_input: swfs_filer_fqdn }
    SWFS_S3_FQDN: { get_input: swfs_s3_fqdn }
    SWFS_ADMIN_PORT: { get_input: swfs_admin_port }
    SWFS_MASTER_PORT: { get_input: swfs_master_port }
    SWFS_FILER_PORT: { get_input: swfs_filer_port }
    SWFS_S3_PORT: { get_input: swfs_s3_port }
    MQ_BROKER_PORT: { get_input: mq_broker_port }
    DEFAULT_FILER_DIR_NAME: { get_input: default_filer_dir_name }
    ARTIFACTS_TO_DOWNLOAD: { concat: ['"', { get_input: artifacts_to_download }, '"'] }
    S3_USER: { get_input: s3_user }
    LOKI_IMAGE: { get_input: loki_image }
    GRAFANA_IMAGE: { get_input: grafana_image }
    PROMETHEUS_EXT_IMAGE: { get_input: prometheus_ext_image }
    GRAFANA_FQDN: { get_input: grafana_fqdn }
    GRAFANA_PORT: { get_input: grafana_port }
    LOKI_PORT: { get_input: loki_port }
    PROMETHEUS_EXT_PORT: { get_input: prometheus_ext_port }
    LOKI_BUCKET: { get_input: loki_bucket }

  command_fabric_env: &command_fabric_env
    shell_env:
      <<: *shell_env
    host_string: { get_environment_capability: vm_name_id }
    user: { get_environment_capability: vm_user_name }
    key: { get_secret: { get_environment_capability: vm_ssh_private_key } }
    port: 22

# Get VM info
  get_vm_info: &get_vm_info
    implementation: fabric.fabric_plugin.tasks.run_script
    inputs:
      script_path: tech-ops/scripts/get_vm_info.sh
      fabric_env:
        host_string: { get_environment_capability: vm_name_id }
        user: { get_environment_capability: vm_user_name } 
        key: { get_secret: { get_environment_capability: vm_ssh_private_key } }
        port: 22
      hide_output: { get_input: hide_log_output }
      proxy_settings:
        auto_resolve: false
        target_id: { get_environment_capability: proxy_target_id }
        target_ip: { get_environment_capability: vm_name_id }

node_templates:

  vm_info:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        start:
          <<: *get_vm_info
        update:
          <<: *get_vm_info

  env_precheck:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *env_precheck_inputs
        update:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *env_precheck_inputs
    relationships:
       - type: dell.relationships.depends_on
         target: vm_info

  install_app:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          executor: central_deployment_agent
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            hide_output: { get_input: hide_log_output }
            proxy_settings:
              auto_resolve: false
              target_id: { get_environment_capability: proxy_target_id }
              target_ip: { get_environment_capability: vm_name_id }
            commands: *run_install_cmds
            fabric_env:
              <<: *command_fabric_env
        update:
          executor: central_deployment_agent
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            hide_output: { get_input: hide_log_output }
            proxy_settings:
              auto_resolve: false
              target_id: { get_environment_capability: proxy_target_id }
              target_ip: { get_environment_capability: vm_name_id }
            commands: *run_install_cmds
            fabric_env:
              <<: *command_fabric_env
        stop:
          executor: central_deployment_agent
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            hide_output: { get_input: hide_log_output }
            proxy_settings:
              auto_resolve: false
              target_id: { get_environment_capability: proxy_target_id }
              target_ip: { get_environment_capability: vm_name_id }
            commands: *run_uninstall_cmds
            fabric_env:
              <<: *command_fabric_env
    relationships:
       - type: dell.relationships.depends_on
         target: env_precheck

  env_postcheck:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *env_postcheck_inputs
        update:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *env_postcheck_inputs
    relationships:
       - type: dell.relationships.depends_on
         target: install_app
