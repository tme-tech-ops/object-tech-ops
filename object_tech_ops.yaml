tosca_definitions_version: dell_1_1

description: >
  This blueprint deploys SeaweedFS with Caddy reverse proxy on an existing edge-cloud-init deployment

imports:
  - dell/types/types.yaml
  - tech-ops/definitions.yaml
  - tech-ops/inputs.yaml
  - tech-ops/outputs.yaml

input_groups:
  deployment_target:
    display_label: Deployment Target
    collapsible: false
    index: 0
    inputs:
      - vm_deployment_id

  seaweedfs_config:
    display_label: SeaweedFS Configuration
    collapsible: true
    index: 1
    inputs:
      - swfs_user
      - swfs_password
      - host_fqdn
      - enable_monitoring
      - enable_smb
      - enable_nfs
      - enable_mq
      - s3_bucket
      - cluster_name
      - debug
      - swfs_image
      - caddy_image
      - swfs_admin_fqdn
      - swfs_master_fqdn
      - swfs_filer_fqdn
      - swfs_s3_fqdn
      - swfs_admin_port
      - swfs_master_port
      - swfs_filer_port
      - swfs_s3_port
      - mq_broker_port
      - default_filer_dir_name
      - artifacts_to_download
      - s3_user
      - loki_image
      - grafana_image
      - prometheus_ext_image
      - grafana_fqdn
      - grafana_port
      - loki_port
      - prometheus_ext_port
      - loki_bucket

  env_config:
    display_label: Environment Configuration
    collapsible: true
    index: 2
    inputs:
      - run_arg
      - script_url
      - offline_mode
      - offline_binary_secret
      - registry_secret
      - registry_url
      - upload_package
      - upload_binary_secret
      - hide_log_output

labels:
  csys-obj-type:
    values:
      - environment
  target_environment:
    values:
      - ned
  vendor:
    values:
      - tme-tech-ops
  solution:
    values:
      - seaweedfs-tech-ops
  version:
    values:
      - "1.0.0.0"

blueprint_labels:
  env:
    values:
      - NED
